<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DQ10 職人素材＆原価計算チェッカー</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      touch-action: manipulation;
    }

    body {
      font-family: "Hiragino Sans", "Meiryo", sans-serif;
      background: #0f141d;
      color: #e0e6ed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 16px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      background: #1a2230;
      border: 2px solid #d4af37;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    h1 {
      font-size: 1.3rem;
      text-align: center;
      color: #f39c12;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid #334155;
      letter-spacing: 1px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 6px;
      font-weight: bold;
    }

    select {
      width: 100%;
      padding: 12px;
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    select:focus {
      border-color: #f39c12;
    }

    select:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* 結果カード */
    .result-card {
      margin-top: 20px;
      background: #0f172a;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #334155;
      display: none;
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px dashed #334155;
    }

    .item-name {
      font-size: 1.2rem;
      font-weight: bold;
      color: #5eead4;
    }

    .item-level {
      font-size: 0.8rem;
      background: #1e293b;
      padding: 2px 8px;
      border-radius: 12px;
      color: #cbd5e1;
    }

    .material-list {
      list-style: none;
    }

    .material-item {
      padding: 12px 0;
      border-bottom: 1px solid #1e293b;
    }

    .material-item:last-child {
      border-bottom: none;
    }

    .mat-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .mat-name {
      font-size: 0.95rem;
      font-weight: bold;
    }

    .mat-count {
      font-size: 0.95rem;
      font-weight: bold;
      color: #f39c12;
    }

    .mat-detail {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .badge {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: bold;
    }

    .badge-shop {
      background: #15803d;
      color: #bbf7d0;
    }

    .badge-bazaar {
      background: #1e40af;
      color: #bfdbfe;
    }

    .shop-info {
      color: #94a3b8;
    }

    /* 価格入力フォーム */
    .calc-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1e293b;
      padding: 6px 10px;
      border-radius: 8px;
    }

    .calc-input-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .calc-input-group label {
      margin-bottom: 0;
      font-size: 0.8rem;
    }

    .price-input {
      width: 90px;
      padding: 6px 8px;
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 6px;
      color: #ffd700;
      font-weight: bold;
      text-align: right;
      font-size: 0.9rem;
    }

    .price-input:disabled {
      background: #1a2230;
      color: #94a3b8;
      border-color: #334155;
    }

    .subtotal {
      font-size: 0.9rem;
      color: #e2e8f0;
      font-weight: bold;
    }

    /* 合計金額エリア */
    .total-card {
      margin-top: 16px;
      background: #1e1b4b;
      border: 2px solid #6366f1;
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .total-title {
      font-size: 1rem;
      font-weight: bold;
      color: #c7d2fe;
    }

    .total-price {
      font-size: 1.4rem;
      font-weight: bold;
      color: #ffd700;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🛡️ DQ10 職人素材＆原価チェッカー</h1>

  <!-- 1. 職人選択 -->
  <div class="form-group">
    <label>1. 職人を選ぶ</label>
    <select id="select-job">
      <option value="">-- 職人を選択 --</option>
    </select>
  </div>

  <!-- 2. ジャンル選択 -->
  <div class="form-group">
    <label>2. ジャンルを選ぶ</label>
    <select id="select-category" disabled>
      <option value="">-- 先に職人を選んでください --</option>
    </select>
  </div>

  <!-- 3. アイテム選択 -->
  <div class="form-group">
    <label>3. 作りたいものを選択</label>
    <select id="select-item" disabled>
      <option value="">-- 先にジャンルを選んでください --</option>
    </select>
  </div>

  <!-- 結果表示＆計算エリア -->
  <div class="result-card" id="result-card">
    <div class="result-header">
      <span class="item-name" id="res-name">-</span>
      <span class="item-level" id="res-level">-</span>
    </div>

    <ul class="material-list" id="res-materials"></ul>

    <!-- 合計原価 -->
    <div class="total-card">
      <span class="total-title">💰 推定作成原価</span>
      <span class="total-price" id="total-price">0 G</span>
    </div>
  </div>
</div>

<script>
  // --- DQ10 データベース（目安価格・店舗情報付き） ---
  const CRAFT_DATA = {
    "🌳 木工職人": {
      "🏹 弓": [
        {
          name: "輝天の弓",
          level: "装備Lv 115",
          materials: [
            { name: "フォレスト鉱石", count: 30, shop: "バザー", defaultPrice: 14000 },
            { name: "デモニウム鉱石", count: 15, shop: "バザー", defaultPrice: 8000 },
            { name: "彩虹のしずく", count: 3, shop: "バザー", defaultPrice: 22000 },
            { name: "超ようせいのひだね", count: 6, shop: "バザー", defaultPrice: 32000 }
          ]
        },
        {
          name: "イルミンズールの弓",
          level: "装備Lv 100",
          materials: [
            { name: "古代樹の化石", count: 24, shop: "バザー", defaultPrice: 8500 },
            { name: "大きな貝ガラ", count: 30, shop: "店", place: "ジュレット素材屋", price: 240 },
            { name: "ようせいのひだね", count: 16, shop: "店", place: "各ギルド素材屋", price: 1000 }
          ]
        }
      ],
      "🪄 両手杖": [
        {
          name: "輝天の杖",
          level: "装備Lv 115",
          materials: [
            { name: "フォレスト鉱石", count: 30, shop: "バザー", defaultPrice: 14000 },
            { name: "古代樹の化石", count: 20, shop: "バザー", defaultPrice: 8500 },
            { name: "超ようせいのひだね", count: 6, shop: "バザー", defaultPrice: 32000 }
          ]
        }
      ],
      "🎣 釣りざお": [
        {
          name: "氷の釣りざお改",
          level: "職人Lv 40",
          materials: [
            { name: "氷の樹木", count: 15, shop: "バザー", defaultPrice: 350 },
            { name: "プラチナ鉱石", count: 10, shop: "店", place: "住宅村・素材屋", price: 360 },
            { name: "ようせいのひだね", count: 8, shop: "店", place: "各ギルド素材屋", price: 1000 }
          ]
        }
      ]
    },
    "⚔️ 武器鍛冶": {
      "🗡️ 片手剣": [
        {
          name: "輝天の剣",
          level: "装備Lv 115",
          materials: [
            { name: "デモニウム鉱石", count: 30, shop: "バザー", defaultPrice: 8000 },
            { name: "ほしのすな", count: 20, shop: "店", place: "各素材屋", price: 120 },
            { name: "超ようせいのひだね", count: 6, shop: "バザー", defaultPrice: 32000 }
          ]
        }
      ]
    },
    "🛡️ 防具鍛冶": {
      "🛡️ 盾": [
        {
          name: "輝天の盾",
          level: "装備Lv 115",
          materials: [
            { name: "デモニウム鉱石", count: 25, shop: "バザー", defaultPrice: 8000 },
            { name: "プラチナ鉱石", count: 20, shop: "店", place: "住宅村・素材屋", price: 360 },
            { name: "超ようせいのひだね", count: 5, shop: "バザー", defaultPrice: 32000 }
          ]
        }
      ]
    },
    "🧵 さいほう": {
      "🥋 ローブ": [
        {
          name: "ロードリーコンボイ",
          level: "装備Lv 115",
          materials: [
            { name: "シルク草", count: 40, shop: "店", place: "各素材屋", price: 240 },
            { name: "妖精の綿花", count: 20, shop: "バザー", defaultPrice: 1800 },
            { name: "あまつのミスト", count: 6, shop: "バザー", defaultPrice: 15000 }
          ]
        }
      ]
    },
    "🔨 道具鍛冶": {
      "🛠️ 職人道具": [
        {
          name: "光の鍛冶ハンマー",
          level: "職人Lv 45",
          materials: [
            { name: "マデュライト", count: 20, shop: "バザー", defaultPrice: 2200 },
            { name: "大きな金属", count: 10, shop: "バザー", defaultPrice: 1500 },
            { name: "ようせいのひだね", count: 10, shop: "店", place: "各ギルド素材屋", price: 1000 }
          ]
        }
      ]
    },
    "🍳 調理職人": {
      "🍲 料理": [
        {
          name: "バトルパッツァ",
          level: "職人Lv 40",
          materials: [
            { name: "しもふりにく", count: 3, shop: "バザー", defaultPrice: 18000 },
            { name: "ピリからゼリー", count: 2, shop: "店", place: "オルフェア素材屋", price: 120 },
            { name: "デリシャスオイル", count: 12, shop: "店", place: "オルフェア素材屋", price: 200 }
          ]
        },
        {
          name: "スマッシュポテト",
          level: "職人Lv 30",
          materials: [
            { name: "ジャンボポテト", count: 5, shop: "店", place: "オルフェア素材屋", price: 120 },
            { name: "ピュアスノー", count: 3, shop: "店", place: "オルフェア素材屋", price: 120 },
            { name: "デリシャスオイル", count: 6, shop: "店", place: "オルフェア素材屋", price: 200 }
          ]
        }
      ]
    },
    "🏺 ツボ錬金": {
      "💥 攻撃効果": [
        {
          name: "こうげき力 +6 (成功)",
          level: "錬金Lv 40",
          materials: [
            { name: "ちからのゆびわ", count: 1, shop: "バザー", defaultPrice: 5000 },
            { name: "ようせいの毒薬", count: 5, shop: "店", place: "ギルド素材屋", price: 300 },
            { name: "汗と涙の結晶", count: 10, shop: "バザー", defaultPrice: 3800 }
          ]
        }
      ]
    },
    "🔮 ランプ錬金": {
      "⚡ 速度効果": [
        {
          name: "呪文発動速度 +6%",
          level: "錬金Lv 40",
          materials: [
            { name: "いつくしみのほむら", count: 2, shop: "バザー", defaultPrice: 12000 },
            { name: "汗と涙の結晶", count: 10, shop: "バザー", defaultPrice: 3800 }
          ]
        }
      ]
    }
  };

  const selectJob = document.getElementById("select-job");
  const selectCategory = document.getElementById("select-category");
  const selectItem = document.getElementById("select-item");
  const resultCard = document.getElementById("result-card");

  // 初期化：職人一覧をセット
  for (let job in CRAFT_DATA) {
    let opt = document.createElement("option");
    opt.value = job;
    opt.innerText = job;
    selectJob.appendChild(opt);
  }

  // 1. 職人選択時
  selectJob.onchange = () => {
    selectCategory.innerHTML = '<option value="">-- ジャンルを選択 --</option>';
    selectItem.innerHTML = '<option value="">-- 先に職人を選んでください --</option>';
    selectItem.disabled = true;
    resultCard.style.display = "none";

    const job = selectJob.value;
    if (!job) {
      selectCategory.disabled = true;
      return;
    }

    const categories = CRAFT_DATA[job];
    for (let cat in categories) {
      let opt = document.createElement("option");
      opt.value = cat;
      opt.innerText = cat;
      selectCategory.appendChild(opt);
    }
    selectCategory.disabled = false;
  };

  // 2. ジャンル選択時
  selectCategory.onchange = () => {
    selectItem.innerHTML = '<option value="">-- 作りたいものを選ぶ --</option>';
    resultCard.style.display = "none";

    const job = selectJob.value;
    const cat = selectCategory.value;
    if (!cat) {
      selectItem.disabled = true;
      return;
    }

    const items = CRAFT_DATA[job][cat];
    items.forEach((item, index) => {
      let opt = document.createElement("option");
      opt.value = index;
      opt.innerText = item.name;
      selectItem.appendChild(opt);
    });
    selectItem.disabled = false;
  };

  // 3. アイテム選択時（表示＆計算処理）
  selectItem.onchange = () => {
    const job = selectJob.value;
    const cat = selectCategory.value;
    const idx = selectItem.value;

    if (idx === "") {
      resultCard.style.display = "none";
      return;
    }

    const item = CRAFT_DATA[job][cat][idx];
    document.getElementById("res-name").innerText = item.name;
    document.getElementById("res-level").innerText = item.level;

    const listEl = document.getElementById("res-materials");
    listEl.innerHTML = "";

    item.materials.forEach((mat, i) => {
      let li = document.createElement("li");
      li.className = "material-item";

      const isShop = mat.shop === "店";
      const badgeHtml = isShop
        ? `<span class="badge badge-shop">店</span><span class="shop-info">場所: ${mat.place}</span>`
        : `<span class="badge badge-bazaar">バザー</span>`;

      const unitPrice = isShop ? mat.price : (mat.defaultPrice || 0);

      li.innerHTML = `
        <div class="mat-top">
          <span class="mat-name">・${mat.name}</span>
          <span class="mat-count">× ${mat.count} 個</span>
        </div>
        <div class="mat-detail">
          ${badgeHtml}
        </div>
        <div class="calc-row">
          <div class="calc-input-group">
            <label>単価:</label>
            <input type="number" class="price-input" id="price-${i}" value="${unitPrice}" ${isShop ? 'disabled' : ''} oninput="calculateTotal()">
            <label>G</label>
          </div>
          <span class="subtotal" id="subtotal-${i}">0 G</span>
        </div>
      `;
      listEl.appendChild(li);
    });

    resultCard.style.display = "block";
    calculateTotal();
  };

  // 原価の自動計算関数
  function calculateTotal() {
    const job = selectJob.value;
    const cat = selectCategory.value;
    const idx = selectItem.value;

    if (!job || !cat || idx === "") return;

    const item = CRAFT_DATA[job][cat][idx];
    let grandTotal = 0;

    item.materials.forEach((mat, i) => {
      const inputEl = document.getElementById(`price-${i}`);
      const price = parseFloat(inputEl.value) || 0;
      const subtotal = price * mat.count;

      document.getElementById(`subtotal-${i}`).innerText = `${subtotal.toLocaleString()} G`;
      grandTotal += subtotal;
    });

    document.getElementById("total-price").innerText = `${grandTotal.toLocaleString()} G`;
  }
</script>

</body>
</html>
